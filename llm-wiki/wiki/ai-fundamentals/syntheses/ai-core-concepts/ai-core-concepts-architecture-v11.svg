  <text x="755" y="275" text-anchor="middle" font-size="8" fill="#15803d">LLM 推理</text>

  <rect x="860" y="240" width="140" height="44" rx="7" fill="#fff" stroke="#a855f7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="930" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">Action</text>
  <text x="930" y="275" text-anchor="middle" font-size="8" fill="#6b21a8">Function Calling</text>

  <rect x="1038" y="240" width="130" height="44" rx="7" fill="#fff" stroke="#6b7280" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1103" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Observation</text>
