  <rect x="1022" y="144" width="120" height="40" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="1082" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Agent</text>
  <text x="1082" y="177" text-anchor="middle" font-size="8" fill="#15803d">自主系统</text>

