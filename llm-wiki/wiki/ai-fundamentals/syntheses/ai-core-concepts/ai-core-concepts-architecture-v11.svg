  <rect x="376" y="146" width="135" height="46" rx="7" fill="#fff" stroke="#f97316" stroke-width="1.5" filter="url(#sh)"/>
  <text x="443" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Alignment</text>
  <text x="443" y="182" text-anchor="middle" font-size="8" fill="#9a3412">RLHF / DPO</text>

