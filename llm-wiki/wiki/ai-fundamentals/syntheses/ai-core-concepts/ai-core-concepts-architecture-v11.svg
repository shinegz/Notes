  <line x1="395" y1="296" x2="395" y2="318" stroke="#3b82f6" stroke-width="1.5"/>
  <path d="M 395,318 L 340,318 L 340,338" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#a-b)"/>

  <!-- LLM Core -->
  <rect x="220" y="338" width="220" height="68" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="3" filter="url(#sh)"/>
  <rect x="224" y="342" width="212" height="60" rx="10" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.4"/>
  <text x="330" y="370" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">LLM</text>
  <text x="330" y="392" text-anchor="middle" font-size="10" fill="#2563eb">Next Token Prediction</text>

  <!-- Context Window -->
  <rect x="38" y="425" width="549" height="72" rx="8" fill="#f0fdfa" fill-opacity="0.4" stroke="#99f6e4" stroke-width="1" stroke-dasharray="5,3"/>
