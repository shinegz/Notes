  <line x1="820" y1="262" x2="860" y2="262" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-g)"/>
  <line x1="1000" y1="262" x2="1038" y2="262" stroke="#a855f7" stroke-width="1.5" marker-end="url(#a-p)"/>

