  <!-- LLM → Context Window -->
  <path d="M 330,406 L 330,418 L 295,418 L 295,440" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#a-c)"/>

