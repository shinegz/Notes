  <text x="761" y="179" text-anchor="middle" font-size="8" fill="#2563eb">推理引擎</text>

  <rect x="864" y="144" width="130" height="40" rx="7" fill="#fff" stroke="#4ade80" stroke-width="1.5" filter="url(#sh)"/>
