  <rect x="686" y="424" width="120" height="38" rx="6" fill="#fff" stroke="#22d3ee" stroke-width="1.2" filter="url(#sh)"/>
  <text x="746" y="443" text-anchor="middle" font-size="11" font-weight="600" fill="#0e7490">Vector DB</text>
  <text x="746" y="456" text-anchor="middle" font-size="8" fill="#0891b2">长期存储</text>

  <rect x="822" y="400" width="118" height="38" rx="6" fill="#fff" stroke="#14b8a6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="881" y="419" text-anchor="middle" font-size="11" font-weight="600" fill="#0f766e">RAG</text>
  <text x="881" y="432" text-anchor="middle" font-size="8" fill="#0d9488">检索增强生成</text>

  <line x1="746" y1="414" x2="746" y2="424" stroke="#06b6d4" stroke-width="1.2" marker-end="url(#a-c)"/>
  <path d="M 806,443 L 822,443 L 822,419" stroke="#06b6d4" stroke-width="1.2" fill="none" marker-end="url(#a-c)"/>

