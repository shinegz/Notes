  <rect x="182" y="250" width="115" height="46" rx="7" fill="#fff" stroke="#93c5fd" stroke-width="1.5" filter="url(#sh)"/>
  <text x="239" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Embedding</text>
