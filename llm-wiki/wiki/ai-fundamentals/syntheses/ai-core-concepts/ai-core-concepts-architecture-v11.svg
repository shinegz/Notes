  <line x1="156" y1="273" x2="182" y2="273" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a-b)"/>
  <line x1="297" y1="273" x2="323" y2="273" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a-b)"/>

