  <rect x="352" y="570" width="110" height="36" rx="6" fill="#fff" stroke="#c084fc" stroke-width="1.2"/>
  <text x="407" y="588" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Tool Schema</text>
  <text x="407" y="600" text-anchor="middle" font-size="7" fill="#6b21a8">函数定义</text>

  <rect x="484" y="570" width="110" height="36" rx="6" fill="#fff" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="539" y="588" text-anchor="middle" font-size="10" font-weight="600" fill="#0e7490">Memory</text>
  <text x="539" y="600" text-anchor="middle" font-size="7" fill="#0891b2">记忆注入</text>

  <rect x="616" y="570" width="110" height="36" rx="6" fill="#fff" stroke="#14b8a6" stroke-width="1.2"/>
  <text x="671" y="588" text-anchor="middle" font-size="10" font-weight="600" fill="#0f766e">RAG</text>
  <text x="671" y="600" text-anchor="middle" font-size="7" fill="#0d9488">检索结果注入</text>

  <text x="770" y="592" font-size="18" fill="#92400e">→</text>
  <text x="795" y="592" font-size="10" font-weight="600" fill="#92400e">共同填充</text>

  <rect x="890" y="570" width="200" height="36" rx="8" fill="#f0fdfa" stroke="#22d3ee" stroke-width="2" filter="url(#sh)"/>
  <text x="990" y="589" text-anchor="middle" font-size="12" font-weight="700" fill="#0e7490">Context Window</text>
  <text x="990" y="601" text-anchor="middle" font-size="8" fill="#0891b2">LLM 输入 Token 上限</text>

  <line x1="845" y1="588" x2="890" y2="588" stroke="#92400e" stroke-width="1.5" marker-end="url(#a-y)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- BRIDGES                                  -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Bridge 1: LLM (left) → LLM reasoning engine (right) -->
  <path d="M 440,372 C 560,372 580,164 686,164" stroke="#f97316" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#a-o)"/>
  <rect x="545" y="250" width="90" height="22" rx="5" fill="#1e1b4b" stroke="#f97316" stroke-width="1"/>
  <text x="590" y="265" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">推理引擎</text>

  <!-- Bridge 2: Context Window (left) → Context Window (composition) -->
  <path d="M 295,484 L 295,540 L 990,540 L 990,570" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#a-c)"/>
  <text x="580" y="536" font-size="8" fill="#0891b2">即 LLM 的输入容器</text>

  <!-- Annotation: Memory short-term = Context Window -->
  <text x="812" y="395" font-size="7" fill="#0891b2" font-style="italic">短期记忆 = Context Window</text>

  <!-- Annotation: Embedding → Vector DB -->
  <text x="195" y="310" font-size="7" fill="#7c3aed" font-style="italic">向量化存储 → Vector DB</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEGEND                                   -->
  <!-- ═══════════════════════════════════════ -->
