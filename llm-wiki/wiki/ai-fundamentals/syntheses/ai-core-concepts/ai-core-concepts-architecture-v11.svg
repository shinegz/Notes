  <text x="1057" y="410" text-anchor="middle" font-size="8" fill="#6b21a8">结构化调用</text>

  <rect x="993" y="426" width="100" height="38" rx="6" fill="#fff" stroke="#c084fc" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1043" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Tool</text>
  <text x="1043" y="458" text-anchor="middle" font-size="8" fill="#6b21a8">外部能力</text>

  <rect x="1113" y="426" width="90" height="38" rx="6" fill="#fff" stroke="#a855f7" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1158" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">MCP</text>
  <text x="1158" y="458" text-anchor="middle" font-size="8" fill="#6b21a8">标准化协议</text>

  <path d="M 1057,416 L 1043,426" stroke="#a855f7" stroke-width="1.2" marker-end="url(#a-p)"/>
  <line x1="1093" y1="445" x2="1113" y2="445" stroke="#a855f7" stroke-width="1.2" marker-end="url(#a-p)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- CONTEXT WINDOW COMPOSITION               -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="20" y="555" width="1260" height="85" rx="10" fill="#fffbeb" fill-opacity="0.5" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="575" font-size="11" font-weight="700" fill="#92400e">Context Window 组成</text>
