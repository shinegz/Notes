  <path d="M 930,284 L 930,330 L 1057,330 L 1057,378" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#a-p)"/>
  <text x="948" y="326" font-size="8" fill="#7c3aed">调用工具</text>

