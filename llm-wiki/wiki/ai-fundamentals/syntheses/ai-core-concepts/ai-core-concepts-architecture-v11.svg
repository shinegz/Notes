  <!-- RIGHT DOMAIN: Agent 架构                 -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="650" y="68" width="630" height="465" rx="14" fill="#f0fdf4" fill-opacity="0.3" stroke="#86efac" stroke-width="1.5"/>
  <rect x="650" y="68" width="630" height="36" rx="14" fill="#166534"/>
  <rect x="650" y="90" width="630" height="14" fill="#166534"/>
  <text x="965" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Agent 架构</text>

