  <text x="123" y="182" text-anchor="middle" font-size="8" fill="#9a3412">算力 · 参数 · 数据</text>

  <rect x="216" y="146" width="135" height="46" rx="7" fill="#fff" stroke="#fb923c" stroke-width="1.5" filter="url(#sh)"/>
