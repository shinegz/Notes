  <rect x="20" y="90" width="585" height="14" fill="#1e3a8a"/>
  <text x="312" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">LLM 架构</text>

  <!-- Training Pipeline -->
