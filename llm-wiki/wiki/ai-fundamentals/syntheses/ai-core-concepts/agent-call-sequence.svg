<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="1200" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">Agent 调用链路时序图</text>

  <rect x="70" y="60" width="100" height="36" rx="8" fill="#6b7280" opacity="0.1" stroke="#6b7280" stroke-width="1.5"/>
  <text x="120" y="83" text-anchor="middle" font-size="14" font-weight="600" fill="#6b7280">用户</text>
  <line x1="120" y1="96" x2="120" y2="680" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="310" y="60" width="100" height="36" rx="8" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="83" text-anchor="middle" font-size="14" font-weight="600" fill="#22c55e">Agent</text>
  <line x1="360" y1="96" x2="360" y2="680" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="550" y="60" width="100" height="36" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="83" text-anchor="middle" font-size="14" font-weight="600" fill="#3b82f6">LLM</text>
  <line x1="600" y1="96" x2="600" y2="680" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="790" y="60" width="100" height="36" rx="8" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="840" y="83" text-anchor="middle" font-size="14" font-weight="600" fill="#06b6d4">天气API</text>
  <line x1="840" y1="96" x2="840" y2="680" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="1030" y="60" width="100" height="36" rx="8" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1080" y="83" text-anchor="middle" font-size="14" font-weight="600" fill="#a855f7">邮件API</text>
  <line x1="1080" y1="96" x2="1080" y2="680" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="120" y1="120" x2="360" y2="120" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="168.0" y="106" width="144" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="240.0" y="118" text-anchor="middle" font-size="11" fill="#374151">① 查北京天气并写邮件</text>
  <line x1="360" y1="155" x2="600" y2="155" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="438.0" y="141" width="84" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="480.0" y="153" text-anchor="middle" font-size="11" fill="#374151">② 分解任务</text>
  <line x1="600" y1="190" x2="360" y2="190" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="330.0" y="176" width="300" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="480.0" y="188" text-anchor="middle" font-size="11" fill="#374151">③ 返回 weather_search JSON</text>
  <line x1="360" y1="225" x2="840" y2="225" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="540.0" y="211" width="120" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="600.0" y="223" text-anchor="middle" font-size="11" fill="#374151">④ 调用天气API</text>
  <line x1="840" y1="260" x2="360" y2="260" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="546.0" y="246" width="108" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="600.0" y="258" text-anchor="middle" font-size="11" fill="#374151">⑤ 返回天气数据</text>
  <line x1="360" y1="295" x2="600" y2="295" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="408.0" y="281" width="144" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="480.0" y="293" text-anchor="middle" font-size="11" fill="#374151">⑥ 天气结果 + 继续</text>
  <line x1="600" y1="330" x2="360" y2="330" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="354.0" y="316" width="252" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="480.0" y="328" text-anchor="middle" font-size="11" fill="#374151">⑦ 返回 send_email JSON</text>
  <line x1="360" y1="365" x2="1080" y2="365" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="660.0" y="351" width="120" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="720.0" y="363" text-anchor="middle" font-size="11" fill="#374151">⑧ 调用邮件API</text>
  <line x1="1080" y1="400" x2="360" y2="400" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="678.0" y="386" width="84" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="720.0" y="398" text-anchor="middle" font-size="11" fill="#374151">⑨ 发送成功</text>
  <line x1="360" y1="435" x2="120" y2="435" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="156.0" y="421" width="168" height="20" rx="4" fill="#fafafa" opacity="0.95"/>
  <text x="240.0" y="433" text-anchor="middle" font-size="11" fill="#374151">⑩ 北京今天晴，邮件已发送</text>
  <rect x="354" y="120" width="12" height="325" rx="2" fill="#22c55e" opacity="0.15"/>
  <rect x="594" y="155" width="12" height="175" rx="2" fill="#3b82f6" opacity="0.15"/>
  <rect x="280" y="175" width="580" height="240" rx="8" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="290" y="192" font-size="11" fill="#9ca3af" font-style="italic">loop: ReAct 循环（Thought → Action → Observation）</text>

  <!-- Legend -->
  <text x="600" y="700" text-anchor="middle" font-size="11" fill="#9ca3af">实线 = 请求调用 | 虚线 = 返回结果</text>

</svg>