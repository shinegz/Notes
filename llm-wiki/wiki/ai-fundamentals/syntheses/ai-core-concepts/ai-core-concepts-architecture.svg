<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 20px; font-weight: 600; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .node-label { font-size: 13px; fill: #111827; font-weight: 500; }
    .node-sub { font-size: 11px; fill: #6b7280; }
    .section-label { font-size: 14px; fill: #374151; font-weight: 600; }
    .legend-text { font-size: 12px; fill: #6b7280; }
  </style>
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
    </marker>
    <!-- Gradient for LLM core -->
    <linearGradient id="llm-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
    </linearGradient>
    <!-- Gradient for Agent core -->
    <linearGradient id="agent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.15"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="920" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" class="title">AI 核心概念关系架构图</text>
  <text x="700" y="58" text-anchor="middle" class="subtitle">LLM 系统 · Agent 系统 · 跨系统集成</text>

  <!-- LLM System Container -->
  <rect x="30" y="80" width="620" height="800" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" rx="12"/>
  <text x="340" y="108" text-anchor="middle" class="section-label" fill="#2563eb">LLM 系统 — 语言模型的完整技术栈</text>
  <!-- Input Layer Label -->
  <text x="60" y="138" class="subtitle">输入层</text>
  <rect x="60" y="148" width="100" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="173" text-anchor="middle" class="node-label">Token</text>
  <text x="110" y="188" text-anchor="middle" class="node-sub">输入原子</text>
  <path d="M165 173 L195 173" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="200" y="148" width="110" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="173" text-anchor="middle" class="node-label">Tokenization</text>
  <text x="255" y="188" text-anchor="middle" class="node-sub">BPE/分词</text>
  <path d="M315 173 L345 173" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="350" y="148" width="100" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="173" text-anchor="middle" class="node-label">Embedding</text>
  <text x="400" y="188" text-anchor="middle" class="node-sub">向量映射</text>
  <path d="M400 203 L400 233" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <!-- Architecture Layer Label -->
  <text x="60" y="248" class="subtitle">架构层</text>
  <rect x="120" y="258" width="280" height="120" fill="url(#llm-gradient)" stroke="#7c3aed" stroke-width="2" rx="10"/>
  <text x="260" y="285" text-anchor="middle" class="node-label" font-size="15">Transformer</text>
  <text x="260" y="302" text-anchor="middle" class="node-sub">LLM 架构基石</text>

  <!-- Self-Attention within Transformer -->
  <rect x="140" y="315" width="100" height="50" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="190" y="340" text-anchor="middle" class="node-label" font-size="12">Self-Attention</text>

  <rect x="260" y="315" width="100" height="50" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="310" y="340" text-anchor="middle" class="node-label" font-size="12">Multi-Head</text>

  <path d="M260 383 L260 413" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <!-- LLM Core Label -->
  <text x="60" y="428" class="subtitle">核心</text>
  <rect x="120" y="418" width="280" height="80" rx="10" fill="#2563eb" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="453" text-anchor="middle" class="node-label" fill="#ffffff" font-size="16">LLM</text>
  <text x="260" y="475" text-anchor="middle" class="node-sub" fill="#bfdbfe">Next-Token Predictor</text>
  <text x="430" y="448" class="node-label" fill="#6b7280">Context Window</text>
  <text x="430" y="468" class="node-sub">工作记忆上限</text>
  <path d="M405 458 L480 458" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,2" fill="none"/>
  <path d="M260 503 L260 533" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <!-- Training Layer Label -->
  <text x="60" y="548" class="subtitle">训练层</text>
  <rect x="60" y="558" width="110" height="55" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="583" text-anchor="middle" class="node-label">Scaling Laws</text>
  <text x="115" y="603" text-anchor="middle" class="node-sub">规模化规律</text>
  <path d="M175 585 L215 585" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="220" y="558" width="100" height="55" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="583" text-anchor="middle" class="node-label">Fine-tuning</text>
  <text x="270" y="603" text-anchor="middle" class="node-sub">SFT/RLHF/DPO</text>
  <path d="M325 585 L365 585" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="370" y="558" width="100" height="55" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="420" y="583" text-anchor="middle" class="node-label">Alignment</text>
  <text x="420" y="603" text-anchor="middle" class="node-sub">人类意图对齐</text>
  <path d="M420 548 L420 498" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="430" y="530" class="node-sub" fill="#ea580c">行为对齐</text>
  <path d="M270 558 L270 503" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <!-- Interface Layer Label -->
  <text x="60" y="668" class="subtitle">接口层</text>
  <rect x="60" y="678" width="100" height="55" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="703" text-anchor="middle" class="node-label">Prompt</text>
  <text x="110" y="723" text-anchor="middle" class="node-sub">few-shot/指令</text>
  <path d="M165 705 L195 705" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="200" y="678" width="130" height="55" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="265" y="703" text-anchor="middle" class="node-label">CoT / ReAct</text>
  <text x="265" y="723" text-anchor="middle" class="node-sub">推理+行动循环</text>
  <path d="M290 678 L290 503" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="300" y="600" class="node-sub" fill="#059669">推理请求</text>
  <!-- Integration: LLM to Agent -->
  <path d="M655 450 L745 450" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="658" y="415" width="80" height="30" fill="#ffffff" stroke="#ea580c" stroke-width="1" rx="4"/>
  <text x="698" y="434" text-anchor="middle" class="node-label" fill="#ea580c" font-size="11">推理引擎</text>
  <!-- ReAct Loop arrow -->
  <path d="M655 550 C700 600 700 380 745 380" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)" stroke-dasharray="6,3"/>
  <text x="680" y="590" class="node-sub" fill="#ea580c">ReAct 循环</text>
  <!-- Agent System Container -->
  <rect x="750" y="80" width="620" height="800" fill="#f0fdf4" stroke="#d1fae5" stroke-width="1" rx="12"/>
  <text x="1060" y="108" text-anchor="middle" class="section-label" fill="#059669">Agent 系统 — 基于 LLM 的自主决策系统</text>
  <!-- Agent Core Label -->
  <text x="780" y="138" class="subtitle">核心</text>
  <rect x="850" y="148" width="260" height="90" rx="10" fill="#059669" stroke="#047857" stroke-width="2" filter="url(#shadow)"/>
  <text x="980" y="185" text-anchor="middle" class="node-label" fill="#ffffff" font-size="18">Agent</text>
  <text x="980" y="210" text-anchor="middle" class="node-sub" fill="#d1fae5">Planning + Memory + Tool 循环</text>
  <rect x="860" y="180" width="70" height="35" rx="4" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="895" y="203" text-anchor="middle" class="node-label" fill="#ffffff" font-size="10">Planning</text>
  <rect x="940" y="180" width="70" height="35" rx="4" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="975" y="203" text-anchor="middle" class="node-label" fill="#ffffff" font-size="10">Memory</text>
  <rect x="1020" y="180" width="70" height="35" rx="4" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="1055" y="203" text-anchor="middle" class="node-label" fill="#ffffff" font-size="10">Tool</text>
  <path d="M980 243 L980 283" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <!-- Memory Layer Label -->
  <text x="780" y="298" class="subtitle">记忆层</text>
  <rect x="780" y="308" width="110" height="65" rx="8" fill="#ccfbf1" stroke="#5eead4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="835" y="335" text-anchor="middle" class="node-label">Vector DB</text>
  <text x="835" y="355" text-anchor="middle" class="node-sub">语义检索</text>
  <!-- DB icon decoration -->
  <ellipse cx="835" cy="318" rx="25" ry="8" fill="none" stroke="#5eead4" stroke-width="1"/>
  <path d="M895 340 L935 340" stroke="#0891b2" stroke-width="1.5" fill="none" marker-end="url(#arrow-cyan)"/>
  <rect x="940" y="308" width="110" height="65" rx="8" fill="#ccfbf1" stroke="#5eead4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="995" y="335" text-anchor="middle" class="node-label">Memory</text>
  <text x="995" y="355" text-anchor="middle" class="node-sub">短期+长期</text>
  <path d="M1055 340 L1095 340" stroke="#0891b2" stroke-width="1.5" fill="none" marker-end="url(#arrow-cyan)"/>
  <rect x="1100" y="308" width="100" height="65" rx="8" fill="#ccfbf1" stroke="#5eead4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1150" y="335" text-anchor="middle" class="node-label">RAG</text>
  <text x="1150" y="355" text-anchor="middle" class="node-sub">检索增强生成</text>
  <path d="M980 378 L980 243" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-cyan)"/>
  <!-- Tool Layer Label -->
  <text x="780" y="448" class="subtitle">工具层</text>
  <rect x="780" y="458" width="130" height="55" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="845" y="483" text-anchor="middle" class="node-label">Tool / Function</text>
  <text x="845" y="503" text-anchor="middle" class="node-sub">外部能力扩展</text>
  <path d="M915 485 L955 485" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="960" y="458" width="100" height="55" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="483" text-anchor="middle" class="node-label">MCP</text>
  <text x="1010" y="503" text-anchor="middle" class="node-sub">工具标准化协议</text>
  <path d="M1065 485 L1105 485" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="1110" y="458" width="100" height="55" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1160" y="483" text-anchor="middle" class="node-label">Skill</text>
  <text x="1160" y="503" text-anchor="middle" class="node-sub">模块化能力封装</text>
  <path d="M980 458 L980 243" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-purple)"/>
  <!-- ReAct Loop -->
  <text x="780" y="588" class="subtitle">ReAct 推理循环</text>
  <rect x="780" y="598" width="130" height="50" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <text x="845" y="623" text-anchor="middle" class="node-label" fill="#0891b2">Thought</text>
  <text x="845" y="638" text-anchor="middle" class="node-sub">推理步骤</text>
  <path d="M915 623 L955 623" stroke="#0891b2" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <rect x="960" y="598" width="130" height="50" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <text x="1025" y="623" text-anchor="middle" class="node-label" fill="#0891b2">Action</text>
  <text x="1025" y="638" text-anchor="middle" class="node-sub">工具调用</text>
  <path d="M1095 623 L1135 623" stroke="#0891b2" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <rect x="1140" y="598" width="140" height="50" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <text x="1210" y="623" text-anchor="middle" class="node-label" fill="#0891b2">Observation</text>
  <text x="1210" y="638" text-anchor="middle" class="node-sub">结果反馈</text>
  <path d="M1240 653 L1240 720 L260 720 L260 503" stroke="#0891b2" stroke-width="1.5" fill="none" marker-end="url(#arrow-cyan)" stroke-dasharray="6,3"/>
  <text x="700" y="735" text-anchor="middle" class="node-sub" fill="#0891b2">← ReAct 循环反馈给 LLM</text>
  <!-- User Input -->
  <rect x="800" y="760" width="80" height="40" rx="20" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="840" y="785" text-anchor="middle" class="node-label" fill="#ffffff" font-size="12">User</text>
  <path d="M840 760 L840 720" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M880 780 L950 780 L950 243" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M1110 243 L1110 780 L1040 780" stroke="#059669" stroke-width="1.5" fill="none" marker-start="url(#arrow-green)"/>
  <rect x="1040" y="760" width="80" height="40" rx="20" fill="#059669" stroke="#047857" stroke-width="1"/>
  <text x="1080" y="785" text-anchor="middle" class="node-label" fill="#ffffff" font-size="12">Response</text>
  <!-- Legend -->
  <rect x="30" y="890" width="500" height="25" fill="#f9fafb" rx="4"/>
  <line x1="45" y1="902" x2="75" y2="902" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="82" y="906" class="legend-text">数据流</text>
  <line x1="130" y1="902" x2="160" y2="902" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="167" y="906" class="legend-text">集成/对齐</text>
  <line x1="215" y1="902" x2="245" y2="902" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="252" y="906" class="legend-text">Agent 流</text>
  <line x1="300" y1="902" x2="330" y2="902" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="337" y="906" class="legend-text">协议/工具</text>
  <line x1="385" y1="902" x2="415" y2="902" stroke="#0891b2" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="422" y="906" class="legend-text">记忆/检索</text>
  <line x1="470" y1="902" x2="500" y2="902" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>
  <text x="507" y="906" class="legend-text">反馈/循环</text>
  <text x="1350" y="906" class="legend-text" text-anchor="end">共 18 个核心概念</text>
</svg>