  <path d="M 487,460 L 487,400 L 560,400 L 560,346" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arr-cyan)"/>
  <path d="M 1100,346 L 1100,420 L 698,420 L 698,460" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arr-purple)"/>
  <rect x="860" y="408" width="56" height="20" rx="5" fill="#1e1b4b"/>
  <text x="888" y="422" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">工具调用</text>
