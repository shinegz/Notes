  <path d="M 98,460 L 98,380 L 520,380 L 520,346" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arr-gray)"/>
  <rect x="260" y="368" width="72" height="20" rx="5" fill="#374151"/>
  <text x="296" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">工作记忆上限</text>
