  <path d="M 1040,346 C 1040,398 640,398 640,346" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-gray)"/>
  <rect x="790" y="385" width="110" height="20" rx="5" fill="#374151"/>
  <text x="845" y="399" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">ReAct 循环反馈</text>
