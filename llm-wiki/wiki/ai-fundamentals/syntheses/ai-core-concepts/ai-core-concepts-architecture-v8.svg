  <text x="410" y="130" text-anchor="middle" font-size="9" fill="#9a3412">算力 / 参数 / 数据</text>
  <rect x="500" y="93" width="125" height="48" rx="8" fill="#ffffff" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="562" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">Fine-tuning</text>
  <text x="562" y="130" text-anchor="middle" font-size="9" fill="#9a3412">SFT / RLHF / DPO</text>
  <rect x="652" y="93" width="118" height="48" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="711" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">Alignment</text>
  <text x="711" y="130" text-anchor="middle" font-size="9" fill="#9a3412">RLHF / DPO</text>
  <line x1="473" y1="117" x2="500" y2="117" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="625" y1="117" x2="652" y2="117" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
