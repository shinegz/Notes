  <rect x="115" y="575" width="970" height="42" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="135" y1="596" x2="165" y2="596" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
