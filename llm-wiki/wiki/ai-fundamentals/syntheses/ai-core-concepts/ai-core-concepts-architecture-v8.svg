  <line x1="465" y1="596" x2="495" y2="596" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="501" y="600" font-size="11" fill="#6b7280">Agent 流</text>
  <line x1="625" y1="596" x2="655" y2="596" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="661" y="600" font-size="11" fill="#6b7280">协议/工具</text>
  <line x1="795" y1="596" x2="825" y2="596" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="831" y="600" font-size="11" fill="#6b7280">记忆/检索</text>
  <line x1="955" y1="596" x2="985" y2="596" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="991" y="600" font-size="11" fill="#6b7280">反馈/循环</text>
  <text x="1160" y="640" text-anchor="end" font-size="10" fill="#94a3b8">共 18 个核心概念</text>
</svg>