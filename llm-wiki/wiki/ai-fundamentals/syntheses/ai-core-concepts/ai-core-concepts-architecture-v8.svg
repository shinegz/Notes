  <path d="M 650,308 L 700,320" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-orange)"/>
  <rect x="641" y="280" width="62" height="20" rx="5" fill="#1e1b4b" stroke="#f97316" stroke-width="0.8"/>
