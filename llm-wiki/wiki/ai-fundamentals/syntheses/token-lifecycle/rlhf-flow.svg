<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">RLHF：三步让 LLM 学会「说好话」</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6b7280">Reinforcement Learning from Human Feedback — InstructGPT 提出的对齐方法</text>
  <rect x="80" y="100" width="240" height="120" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">Step 1: SFT</text>
  <text x="200" y="148" text-anchor="middle" font-size="12" fill="#3b82f6">Supervised Fine-Tuning</text>
  <text x="200" y="172" text-anchor="middle" font-size="11" fill="#6b7280">人工标注问答对</text>
  <text x="200" y="190" text-anchor="middle" font-size="11" fill="#6b7280">格式对齐训练</text>
  <text x="200" y="208" text-anchor="middle" font-size="10" fill="#9ca3af">loss = CE(model(out), target)</text>
  <rect x="80" y="230" width="240" height="55" rx="6" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="90" y="250" font-size="10" fill="#374151">Prompt: "什么是量子计算？"</text>
  <text x="90" y="268" font-size="10" fill="#374151">Response: "量子计算是一种..."</text>
  <line x1="320" y1="160" x2="370" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="380" y="100" width="240" height="120" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#9d174d">Step 2: RM</text>
  <text x="500" y="148" text-anchor="middle" font-size="12" fill="#db2777">Reward Model</text>
  <text x="500" y="172" text-anchor="middle" font-size="11" fill="#6b7280">学习人类偏好</text>
  <text x="500" y="190" text-anchor="middle" font-size="11" fill="#6b7280">奖励信号建模</text>
  <text x="500" y="208" text-anchor="middle" font-size="10" fill="#9ca3af">r = RewardModel(prompt, response)</text>
  <rect x="380" y="230" width="240" height="55" rx="6" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="390" y="250" font-size="10" fill="#374151">Response A (好) → 高 reward</text>
  <text x="390" y="268" font-size="10" fill="#374151">Response B (差) → 低 reward</text>
  <line x1="620" y1="160" x2="670" y2="160" stroke="#db2777" stroke-width="2" marker-end="url(#arrow-red)"/>
  <path d="M 500 220 C 540 270 580 250 580 230" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <text x="585" y="240" font-size="10" fill="#ea580c">人类</text>
  <text x="585" y="252" font-size="10" fill="#ea580c">反馈</text>
  <rect x="680" y="100" width="240" height="120" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">Step 3: PPO</text>
  <text x="800" y="148" text-anchor="middle" font-size="12" fill="#16a34a">PPO 强化学习优化</text>
  <text x="800" y="172" text-anchor="middle" font-size="11" fill="#6b7280">用 Reward 调整策略</text>
  <text x="800" y="190" text-anchor="middle" font-size="11" fill="#6b7280">KL 散度约束防偏离</text>
  <text x="800" y="208" text-anchor="middle" font-size="10" fill="#9ca3af">loss = -E[reward] + β·KL(π‖π_SFT)</text>
  <line x1="920" y1="160" x2="970" y2="160" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="980" y="115" width="120" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1040" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">对齐后</text>
  <text x="1040" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">LLM</text>
  <rect x="80" y="310" width="800" height="100" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="335" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">RLHF 解决的问题</text>
  <rect x="150" y="350" width="200" height="45" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#ef4444">幻觉</text>
  <text x="250" y="388" text-anchor="middle" font-size="10" fill="#6b7280">答非所问但流畅</text>
  <rect x="410" y="350" width="200" height="45" rx="6" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
  <text x="510" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#f97316">有害内容</text>
  <text x="510" y="388" text-anchor="middle" font-size="10" fill="#6b7280">偏见、暴力、歧视</text>
  <rect x="670" y="350" width="200" height="45" rx="6" fill="#ffffff" stroke="#eab308" stroke-width="1.5"/>
  <text x="770" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#eab308">不听话</text>
  <text x="770" y="388" text-anchor="middle" font-size="10" fill="#6b7280">不按指令行动</text>
  <rect x="80" y="430" width="800" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="455" text-anchor="middle" font-size="14" font-weight="600" fill="#6d28d9">演进：DPO (Direct Preference Optimization)</text>
  <text x="480" y="480" text-anchor="middle" font-size="12" fill="#7c3aed">绕过 Reward Model，直接用偏好对优化 — 更简单，效果相当</text>
  <text x="480" y="530" text-anchor="middle" font-size="11" fill="#9ca3af">InstructGPT 2022 · Ouyang et al.</text>
</svg>