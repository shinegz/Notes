<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Embedding 空间：Vector Arithmetic</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6b7280">语义关系在向量空间中可计算 — word2vec 的发现</text>
  <line x1="150" y1="420" x2="450" y2="420" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="150" y1="420" x2="150" y2="120" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="460" y="425" font-size="11" fill="#9ca3af">性别维度 →</text>
  <text x="115" y="115" font-size="11" fill="#9ca3af">↑ 权力维度</text>
  <line x1="250" y1="420" x2="250" y2="120" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="320" x2="450" y2="320" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="350" y1="420" x2="350" y2="120" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="220" x2="450" y2="220" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="350" y1="340" x2="350" y2="170" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="150" y1="420" x2="250" y2="340" stroke="#dc2626" stroke-width="2.5"/>
  <rect x="258" y="335" width="50" height="20" rx="3" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="283" y="349" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">woman</text>
  <line x1="150" y1="420" x2="250" y2="170" stroke="#059669" stroke-width="2.5" stroke-dasharray="5,3"/>
  <rect x="258" y="165" width="50" height="20" rx="3" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="283" y="179" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">queen*</text>
  <circle cx="350" cy="170" r="8" fill="#2563eb"/>
  <text x="362" y="174" font-size="12" font-weight="600" fill="#1e40af">king</text>
  <circle cx="350" cy="340" r="8" fill="#7c3aed"/>
  <text x="358" y="344" font-size="12" font-weight="600" fill="#6d28d9">man</text>
  <text x="310" y="250" font-size="11" fill="#7c3aed">king - man</text>
  <line x1="230" y1="200" x2="230" y2="240" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="150" y1="420" x2="230" y2="280" stroke="#dc2626" stroke-width="2"/>
  <line x1="150" y1="420" x2="430" y2="240" stroke="#059669" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="230" cy="240" r="7" fill="#dc2626"/>
  <text x="240" y="244" font-size="11" fill="#991b1b">paris</text>
  <circle cx="230" cy="200" r="7" fill="#7c3aed"/>
  <text x="200" y="204" font-size="11" fill="#6d28d9">france</text>
  <circle cx="230" cy="280" r="7" fill="#dc2626"/>
  <text x="200" y="284" font-size="11" fill="#991b1b">italy</text>
  <circle cx="430" cy="240" r="7" fill="#059669"/>
  <text x="440" y="244" font-size="11" fill="#065f46">rome*</text>
  <rect x="560" y="80" width="360" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#glow)"/>
  <text x="740" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#1e40af">king − man + woman ≈ queen</text>
  <text x="740" y="130" text-anchor="middle" font-size="13" fill="#3b82f6">性别维度平移 100 单位 → 皇族对应关系</text>
  <rect x="560" y="170" width="360" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="740" y="195" text-anchor="middle" font-size="16" font-weight="600" fill="#15803d">paris − france + italy ≈ rome</text>
  <text x="740" y="220" text-anchor="middle" font-size="13" fill="#16a34a">首都-国家关系平移 → 地理对应关系</text>
  <rect x="560" y="270" width="360" height="90" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="740" y="300" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">核心洞察</text>
  <text x="740" y="325" text-anchor="middle" font-size="12" fill="#b45309">Embedding 将语义编码为向量</text>
  <text x="740" y="343" text-anchor="middle" font-size="12" fill="#b45309">语义关系成为可加减的几何关系</text>
  <text x="740" y="361" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">这正是 LLM "理解" 语言的方式</text>
  <text x="480" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Token → Embedding 层 → 向量空间中的点</text>
  <rect x="120" y="385" width="80" height="35" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="407" text-anchor="middle" font-size="13" fill="#1e40af">"king"</text>
  <line x1="200" y1="402" x2="240" y2="402" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="250" y="385" width="80" height="35" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="290" y="407" text-anchor="middle" font-size="13" fill="#3730a3">Embedding</text>
  <line x1="330" y1="402" x2="370" y2="402" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <circle cx="450" cy="402" r="6" fill="#2563eb"/>
  <text x="450" y="420" text-anchor="middle" font-size="11" fill="#6b7280">[0.2, -0.5, 0.8, ...]</text>
  <text x="450" y="435" text-anchor="middle" font-size="11" fill="#9ca3af">4096 维稠密向量</text>
</svg>